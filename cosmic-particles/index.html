<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Particles</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    cursor: crosshair;
    font-family: 'Courier New', monospace;
  }
  canvas { display: block; }
  #ui {
    position: fixed;
    top: 16px;
    left: 16px;
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    line-height: 1.6;
    pointer-events: none;
    z-index: 10;
    text-shadow: 0 0 8px rgba(0,0,0,0.8);
  }
  #controls {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.35);
    font-size: 12px;
    text-align: center;
    pointer-events: none;
    z-index: 10;
    text-shadow: 0 0 8px rgba(0,0,0,0.8);
  }
  #controls span { margin: 0 10px; }
</style>
</head>
<body>
<div id="ui">
  <div id="stats"></div>
</div>
<div id="controls">
  <span>Click: Attract</span>
  <span>Right-click: Repel</span>
  <span>Drag: Fling</span>
  <span>Scroll: Gravity</span>
  <span>Space: Trails</span>
  <span>R: Reset</span>
</div>
<canvas id="c"></canvas>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const stats = document.getElementById('stats');

  // --- Config ---
  const MAX_PARTICLES = 3000;
  const SPAWN_RATE = 8;          // particles per frame at start
  const INITIAL_PARTICLES = 800;
  const TRAIL_ALPHA = 0.06;
  const WELL_RADIUS_MIN = 40;
  const WELL_MAX_FORCE = 2.5;
  const PARTICLE_MAX_SPEED = 8;
  const FLING_RATE = 12;

  let W, H;
  let gravityMult = 1.0;
  let showTrails = true;
  let mouseDown = false;
  let mouseX = 0, mouseY = 0;
  let dragStartX = 0, dragStartY = 0;
  let frameCount = 0;
  let fps = 0;
  let lastFpsTime = performance.now();

  // --- Resize ---
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // --- Stars (static background) ---
  const stars = [];
  for (let i = 0; i < 300; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.2 + 0.3,
      a: Math.random() * 0.5 + 0.2,
      twinkleSpeed: Math.random() * 0.02 + 0.005
    });
  }

  // --- Particle pool ---
  const particles = [];

  function createParticle(x, y, vx, vy) {
    if (particles.length >= MAX_PARTICLES) return;
    particles.push({
      x, y, vx, vy,
      life: 1.0,
      decay: Math.random() * 0.002 + 0.001,
      hue: 220 + Math.random() * 40,  // start blue-ish
      size: Math.random() * 2 + 1
    });
  }

  function spawnInitial() {
    for (let i = 0; i < INITIAL_PARTICLES; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 0.8 + 0.1;
      createParticle(
        Math.random() * W,
        Math.random() * H,
        Math.cos(angle) * speed,
        Math.sin(angle) * speed
      );
    }
  }

  // --- Gravity wells ---
  const wells = [];

  function addWell(x, y, strength) {
    wells.push({
      x, y,
      strength,            // positive = attract, negative = repel
      life: 1.0,
      decay: 0.0008,
      radius: WELL_RADIUS_MIN + Math.abs(strength) * 20,
      hue: strength > 0 ? 200 : 0
    });
  }

  // --- Physics ---
  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];

      // Apply gravity wells
      for (let j = 0; j < wells.length; j++) {
        const w = wells[j];
        const dx = w.x - p.x;
        const dy = w.y - p.y;
        const distSq = dx * dx + dy * dy + 100; // softening
        const dist = Math.sqrt(distSq);
        const force = (w.strength * gravityMult * w.life) / distSq * 80;
        p.vx += (dx / dist) * force;
        p.vy += (dy / dist) * force;
      }

      // Clamp speed
      const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      if (speed > PARTICLE_MAX_SPEED) {
        p.vx = (p.vx / speed) * PARTICLE_MAX_SPEED;
        p.vy = (p.vy / speed) * PARTICLE_MAX_SPEED;
      }

      // Color shift based on speed
      p.hue = 220 - speed * 25; // blue → purple → pink as speed increases
      if (p.hue < 280) p.hue += 360; // wrap to keep in nice range
      p.hue = ((speed / PARTICLE_MAX_SPEED) * 160 + 200) % 360;

      // Move
      p.x += p.vx;
      p.y += p.vy;

      // Wrap edges
      if (p.x < -10) p.x += W + 20;
      if (p.x > W + 10) p.x -= W + 20;
      if (p.y < -10) p.y += H + 20;
      if (p.y > H + 10) p.y -= H + 20;

      // Age
      p.life -= p.decay;
      if (p.life <= 0) {
        particles.splice(i, 1);
      }
    }
  }

  function updateWells() {
    for (let i = wells.length - 1; i >= 0; i--) {
      wells[i].life -= wells[i].decay;
      if (wells[i].life <= 0) {
        wells.splice(i, 1);
      }
    }
  }

  // --- Ambient spawning ---
  function spawnAmbient() {
    if (particles.length < MAX_PARTICLES * 0.6) {
      for (let i = 0; i < SPAWN_RATE; i++) {
        // Spawn from edges
        const edge = Math.floor(Math.random() * 4);
        let x, y, vx, vy;
        const speed = Math.random() * 0.5 + 0.2;
        if (edge === 0) { x = 0; y = Math.random() * H; vx = speed; vy = (Math.random() - 0.5) * speed; }
        else if (edge === 1) { x = W; y = Math.random() * H; vx = -speed; vy = (Math.random() - 0.5) * speed; }
        else if (edge === 2) { x = Math.random() * W; y = 0; vx = (Math.random() - 0.5) * speed; vy = speed; }
        else { x = Math.random() * W; y = H; vx = (Math.random() - 0.5) * speed; vy = -speed; }
        createParticle(x, y, vx, vy);
      }
    }
  }

  // --- Rendering ---
  function drawStars() {
    const t = frameCount;
    for (const s of stars) {
      const flicker = 0.5 + 0.5 * Math.sin(t * s.twinkleSpeed);
      ctx.globalAlpha = s.a * flicker;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawParticles() {
    ctx.globalCompositeOperation = 'lighter';
    for (const p of particles) {
      const alpha = p.life * 0.8;
      const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      const lightness = 50 + (speed / PARTICLE_MAX_SPEED) * 30;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = `hsl(${p.hue}, 80%, ${lightness}%)`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (0.5 + p.life * 0.5), 0, Math.PI * 2);
      ctx.fill();

      // Glow layer
      if (speed > 2) {
        ctx.globalAlpha = alpha * 0.3;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
  }

  function drawWells() {
    for (const w of wells) {
      const alpha = w.life * 0.4;
      const isAttractor = w.strength > 0;

      // Pulsing ring
      const pulse = 1 + 0.15 * Math.sin(frameCount * 0.08);
      const r = w.radius * pulse * w.life;

      ctx.globalCompositeOperation = 'lighter';

      // Outer glow
      const grad = ctx.createRadialGradient(w.x, w.y, 0, w.x, w.y, r);
      if (isAttractor) {
        grad.addColorStop(0, `rgba(100, 150, 255, ${alpha * 0.5})`);
        grad.addColorStop(0.5, `rgba(60, 100, 200, ${alpha * 0.2})`);
        grad.addColorStop(1, 'rgba(0, 0, 60, 0)');
      } else {
        grad.addColorStop(0, `rgba(255, 100, 80, ${alpha * 0.5})`);
        grad.addColorStop(0.5, `rgba(200, 60, 40, ${alpha * 0.2})`);
        grad.addColorStop(1, 'rgba(60, 0, 0, 0)');
      }
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(w.x, w.y, r, 0, Math.PI * 2);
      ctx.fill();

      // Core dot
      ctx.globalAlpha = w.life * 0.8;
      ctx.fillStyle = isAttractor ? '#8af' : '#f86';
      ctx.beginPath();
      ctx.arc(w.x, w.y, 3, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
    }
  }

  // --- Main loop ---
  function frame() {
    frameCount++;

    // FPS counter
    if (frameCount % 30 === 0) {
      const now = performance.now();
      fps = Math.round(30000 / (now - lastFpsTime));
      lastFpsTime = now;
      stats.textContent = `Particles: ${particles.length} | Wells: ${wells.length} | FPS: ${fps} | Gravity: ${gravityMult.toFixed(1)}x`;
    }

    // Clear / trails
    if (showTrails) {
      ctx.fillStyle = `rgba(0, 0, 0, ${TRAIL_ALPHA})`;
      ctx.fillRect(0, 0, W, H);
    } else {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
    }

    drawStars();

    // Fling particles while dragging
    if (mouseDown) {
      const dx = mouseX - dragStartX;
      const dy = mouseY - dragStartY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 10) {
        for (let i = 0; i < FLING_RATE; i++) {
          const spread = 0.3;
          const angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * spread;
          const speed = Math.min(dist * 0.03, 4) + Math.random() * 0.5;
          createParticle(
            dragStartX + (Math.random() - 0.5) * 10,
            dragStartY + (Math.random() - 0.5) * 10,
            Math.cos(angle) * speed,
            Math.sin(angle) * speed
          );
        }
      }
    }

    spawnAmbient();
    updateParticles();
    updateWells();
    drawParticles();
    drawWells();

    requestAnimationFrame(frame);
  }

  // --- Input ---
  canvas.addEventListener('mousedown', (e) => {
    if (e.button === 0) {
      mouseDown = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
    }
  });

  canvas.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  canvas.addEventListener('mouseup', (e) => {
    if (e.button === 0) {
      mouseDown = false;
      const dx = e.clientX - dragStartX;
      const dy = e.clientY - dragStartY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 5) {
        // Click — place attractor
        addWell(e.clientX, e.clientY, 1.5 + Math.random() * 0.5);
      }
      // If dragged, particles were already flung during drag
    }
  });

  canvas.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    addWell(e.clientX, e.clientY, -(1.5 + Math.random() * 0.5));
  });

  window.addEventListener('wheel', (e) => {
    gravityMult = Math.max(0.1, Math.min(5.0, gravityMult + (e.deltaY > 0 ? -0.2 : 0.2)));
  });

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      showTrails = !showTrails;
    }
    if (e.code === 'KeyR') {
      particles.length = 0;
      wells.length = 0;
      gravityMult = 1.0;
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      spawnInitial();
    }
  });

  // --- Start ---
  spawnInitial();
  frame();
})();
</script>
</body>
</html>
